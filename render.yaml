# Render Blueprint - https://render.com/docs/blueprint-spec
# One-click deploy: push this repo to Render with "Blueprint" mode.
services:
  - type: web
    name: bali-adventure-moto
    runtime: node
    plan: free
    region: singapore
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATA_DIR
        value: /var/data
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: SESSION_SECRET
        generateValue: true
    disk:
      name: bali-data
      mountPath: /var/data
      sizeGB: 1
